<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Assistant Notification</title>
</head>

<body>
    <h1 id="title">Loading notification title...</h1>
    <p id="content">Loading notification content...</p>

    <script>
        function GetURLParameter(sParam) {
            var sPageURL = globalThis.location.search.substring(1);
            var sURLVariables = sPageURL.split('&');
            for (const element of sURLVariables) {
                var sParameterName = element.split('=');
                if (sParameterName[0] == sParam) {
                    return sParameterName[1];
                }
            }
        }

        const title = GetURLParameter("title");
        const content = GetURLParameter("content");

        if (title === undefined) {
            document.getElementById("title").textContent = "No title provided";
        } else {
            document.getElementById("title").textContent = title;
        }

        if (content === undefined) {
            document.getElementById("content").textContent = "No content provided";
        } else {
            document.getElementById("content").textContent = content;
        }

    </script>

</body>

</html>
